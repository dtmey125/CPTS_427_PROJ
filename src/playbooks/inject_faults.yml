- name: inject faults
  hosts: nagios_clients
  tasks:
    - name: Add 10% packet loss on eth1
      ansible.builtin.command: tc qdisc add dev eth1 root netem loss 10%

    - name: Add delay
      ansible.builtin.command: tc qdisc add dev eth1 root netem delay 500ms

    - name: remove netem qdisc
      ansible.builtin.command: tc qdisc del eth1 root netem
